<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kid's Letter Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game" aria-live="polite">
      <h1>🌈 Learn Your Letters!</h1>
      <p class="subtitle">Tap <strong>Start Game</strong>, listen, then pick the matching letter.</p>

      <section class="status">
        <p>⭐ Score: <span id="score">0</span></p>
        <p>🎯 Round: <span id="round">1</span></p>
      </section>

      <section class="prompt-panel">
        <p id="promptText">Press Start Game to begin!</p>
        <div class="controls">
          <button id="startBtn" type="button">▶️ Start Game</button>
          <button id="speakBtn" type="button" disabled>🔊 Say Letter</button>
          <button id="nextBtn" type="button" disabled>➡️ Next Round</button>
        </div>
        <p id="audioStatus" class="audio-status"></p>
      </section>

      <section class="letter-grid" id="letterGrid" aria-label="Letter options"></section>

      <p id="feedback" class="feedback"></p>
    </main>

    <script src="script.js"></script>
  </body>
</html>
